<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #181818;
  color: #e0e0e0;
  min-height: 100vh;
  transition: background 0.3s;
}

a { color: inherit; text-decoration: none; }

/* Header */
.header {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 24px 0;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 16px;
}

.header-left { flex: 1; min-width: 200px; }

.header h1 {
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.clock {
  font-size: 0.85rem;
  color: #888;
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.search-input {
  padding: 8px 14px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  color: #e0e0e0;
  font-size: 0.9rem;
  outline: none;
  width: 220px;
  transition: border-color 0.2s, background 0.2s;
}
.search-input:focus {
  border-color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.08);
}
.search-input::placeholder { color: #666; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  color: #ccc;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.25);
}
.btn svg { width: 18px; height: 18px; }

/* Grid */
.main-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
}

.card-grid.drag-over .card-placeholder {
  opacity: 1;
  height: 120px;
}

/* Card */
.card {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 28px 16px;
  border-radius: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  cursor: grab;
  user-select: none;
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease, opacity 0.2s;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.12);
}
.card.dragging {
  opacity: 0.4;
  transform: scale(0.98);
}
.card.drag-over {
  border-top: 2px solid #888;
}

.card-icon {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #aaa;
}
.card-icon svg {
  width: 32px;
  height: 32px;
}
.card-icon img {
  width: 32px;
  height: 32px;
  object-fit: contain;
  border-radius: 4px;
}

.card-name {
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

/* Card action buttons */
.card-actions {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}
.card:hover .card-actions { opacity: 1; }

.card-action-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border: none;
  border-radius: 6px;
  background: rgba(255,255,255,0.1);
  color: #ccc;
  cursor: pointer;
  font-size: 0.8rem;
}
.card-action-btn:hover {
  background: rgba(255,255,255,0.2);
  color: #fff;
}
.card-action-btn svg { width: 14px; height: 14px; }
.card-action-btn.delete:hover { background: rgba(220,60,60,0.3); }

/* Placeholder for drop */
.card-placeholder {
  border: 2px dashed rgba(255,255,255,0.15);
  border-radius: 12px;
  opacity: 0;
  height: 0;
  transition: all 0.2s;
  pointer-events: none;
}

/* Modal overlay */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.active { display: flex; }

/* Modal */
.modal {
  background: #222;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 32px;
  width: 100%;
  max-width: 440px;
  max-height: 90vh;
  overflow-y: auto;
}

.modal h2 {
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 24px;
}

.form-group {
  margin-bottom: 18px;
}
.form-group label {
  display: block;
  font-size: 0.85rem;
  color: #999;
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  color: #e0e0e0;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: rgba(255,255,255,0.3); }

/* Icon picker */
.icon-picker-container {
  max-height: 360px;
  overflow-y: auto;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 8px;
}
.icon-picker-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
}
.icon-picker-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 4px;
  border-radius: 8px;
  border: 2px solid transparent;
  background: rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.icon-picker-item:hover { background: rgba(255,255,255,0.08); }
.icon-picker-item.selected { border-color: rgba(255,255,255,0.4); }
.icon-picker-item svg { width: 24px; height: 24px; color: #aaa; }
.icon-picker-item span { font-size: 0.7rem; color: #888; margin-top: 4px; }

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 28px;
}

.btn-text {
  padding: 8px 20px;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-text.cancel {
  background: rgba(255,255,255,0.06);
  color: #aaa;
}
.btn-text.cancel:hover { background: rgba(255,255,255,0.1); }
.btn-text.primary {
  background: #3b82f6;
  color: #fff;
}
.btn-text.primary:hover { background: #2563eb; }

/* Settings modal - background presets */
.bg-presets {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 18px;
}
.bg-preset-item {
  height: 48px;
  border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color 0.15s;
}
.bg-preset-item:hover { border-color: rgba(255,255,255,0.3); }
.bg-preset-item.selected { border-color: #fff; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 10px 24px;
  border-radius: 8px;
  background: #333;
  color: #e0e0e0;
  font-size: 0.9rem;
  z-index: 2000;
  opacity: 0;
  transition: transform 0.3s, opacity 0.3s;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Responsive */
@media (max-width: 768px) {
  .card-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
  .card { padding: 22px 12px; }
  .header { padding: 24px 16px 0; }
  .main-content { padding: 16px; }
  .search-input { width: 160px; }
  .modal { padding: 24px; }
  .icon-picker-grid { grid-template-columns: repeat(5, 1fr); }
}
@media (max-width: 480px) {
  .card-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .card { padding: 18px 10px; border-radius: 10px; }
  .card-icon { width: 32px; height: 32px; }
  .card-icon svg { width: 26px; height: 26px; }
  .card-name { font-size: 0.85rem; }
  .header h1 { font-size: 1.4rem; }
  .search-input { width: 120px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* Selection */
::selection { background: rgba(255,255,255,0.15); }

/* Password modal */
.password-input-wrapper {
  position: relative;
}
.password-input-wrapper .toggle-vis {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #666;
  cursor: pointer;
  font-size: 0.85rem;
}
.password-input-wrapper .toggle-vis:hover { color: #aaa; }

/* Fade in animation */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.card { animation: fadeInUp 0.35s ease both; }
</style>
</head>
<body>

  <div class="header-left">
    <h1>导航</h1>
    <div class="clock" id="clock"></div>
  </div>
  <div class="header-actions">
    <input type="text" class="search-input" id="search" placeholder="搜索...">

    </button>
    <button class="btn" id="btn-settings" title="设置">

    </button>
  </div>
</header>

<main class="main-content">
  <div class="card-grid" id="grid"></div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <h2 id="modal-edit-title">新增项目</h2>
    <div class="form-group">
      <label>名称</label>
      <input type="text" class="form-input" id="edit-name" placeholder="服务名称">
    </div>
    <div class="form-group">
      <label>链接</label>
      <input type="text" class="form-input" id="edit-url" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>图标</label>
      <div id="icon-picker"></div>
      <div style="margin-top:10px">
        <input type="text" class="form-input" id="edit-icon-url" placeholder="或输入图片URL：https://...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-text cancel" onclick="closeEditModal()">取消</button>
      <button class="btn-text primary" onclick="saveService()">保存</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal">
    <h2>设置</h2>
    <div class="form-group">
      <label>背景</label>
      <div class="bg-presets" id="bg-presets"></div>
      <input type="text" class="form-input" id="bg-custom" placeholder="自定义颜色值：#222 或渐变函数">
    </div>
    <div class="modal-footer">
      <button class="btn-text cancel" onclick="closeSettingsModal()">关闭</button>
    </div>
  </div>
</div>

<!-- Password Verification Modal -->
<div class="modal-overlay" id="modal-password">
  <div class="modal" style="max-width:360px">
    <h2>身份验证</h2>
    <div class="form-group">
      <label>密码</label>
      <div class="password-input-wrapper">
        <input type="password" class="form-input" id="password-input" placeholder="请输入密码" style="padding-right:40px">
        <button class="toggle-vis" onclick="togglePasswordVis()" type="button">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-text cancel" onclick="closePasswordModal()">取消</button>
      <button class="btn-text primary" onclick="submitPassword()">确认</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

// === State ===

// === Clock ===
function updateClock() {
  const now = new Date();
  const d = now.toLocaleDateString("zh-CN", { year: "numeric", month: "2-digit", day: "2-digit", weekday: "short" });
  const t = now.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  document.getElementById("clock").textContent = `${d} ${t}`;
}
updateClock();
setInterval(updateClock, 1000);

// === Toast ===
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2000);
}

// === Password Verification ===
function ensureVerified(callback) {
  if (verified) {
    callback();
    return;
  }
  pendingAction = callback;
  document.getElementById("password-input").value = "";
  document.getElementById("modal-password").classList.add("active");
  setTimeout(() => document.getElementById("password-input").focus(), 100);
}

function togglePasswordVis() {
  const input = document.getElementById("password-input");
  input.type = input.type === "password" ? "text" : "password";
}

async function submitPassword() {
  const pwd = document.getElementById("password-input").value;
  if (!pwd) { showToast("请输入密码"); return; }
  try {
    const res = await fetch("/api/config", {
      method: "POST",
      body: JSON.stringify({ action: "verify", password: pwd }),
      headers: { "Content-Type": "application/json" }
    });
    const data = await res.json();
    if (data.ok) {
      verified = true;
      closePasswordModal();
      if (pendingAction) {
        pendingAction();
        pendingAction = null;
      }
    } else {
      showToast("密码错误");
      document.getElementById("password-input").value = "";
      document.getElementById("password-input").focus();
    }
  } catch {
    showToast("验证失败，请重试");
  }
}

function closePasswordModal() {
  document.getElementById("modal-password").classList.remove("active");
  pendingAction = null;
}

// Enter key to submit password
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && document.getElementById("modal-password").classList.contains("active")) {
    submitPassword();
  }
});

// === API ===
async function loadConfig() {
  // Try D1 API first
  try {
    const res = await fetch("/api/config");
    config = await res.json();
    localStorage.setItem("nav_config", JSON.stringify(config));
    return;
  } catch {}

  // Fallback to localStorage
  const saved = localStorage.getItem("nav_config");
  if (saved) {
    try { config = JSON.parse(saved); return; } catch {}
  }

  // Last resort: default config
  config = getDefaultConfig();
}

async function saveConfig() {
  // Always save to localStorage first
  localStorage.setItem("nav_config", JSON.stringify(config));
  // Also sync to D1 with password
  try {
    const body = Object.assign({}, config, { password: "mewlxy" });
    await fetch("/api/config", { method: "POST", body: JSON.stringify(body), headers: { "Content-Type": "application/json" } });
  } catch {}
}

// === Render ===
function applyBackground() {
  if (config.background) {
    document.body.style.background = config.background.value;
  }
}

function renderGrid(filter = "") {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const q = filter.toLowerCase();

  config.services.forEach((svc, i) => {
    if (q && !svc.name.toLowerCase().includes(q)) return;

    const card = document.createElement("div");
    card.className = "card";
    card.draggable = true;
    card.dataset.index = i;
    card.style.animationDelay = `${i * 0.04}s`;

    let iconHtml = "";
    if (svc.iconType === "url" && svc.icon) {
      iconHtml = `<div class="card-icon"><img src="${escHtml(svc.icon)}" alt="${escHtml(svc.name)}"></div>`;
    } else if (ICONS[svc.icon]) {
      iconHtml = `<div class="card-icon">${ICONS[svc.icon]}</div>`;
    } else {
      iconHtml = `<div class="card-icon">${ICONS.server}</div>`;
    }

    card.innerHTML = `
      ${iconHtml}
      <div class="card-name" title="${escHtml(svc.url)}">${escHtml(svc.name)}</div>
      <div class="card-actions">
        <button class="card-action-btn" onclick="editService(${i})" title="编辑">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="card-action-btn delete" onclick="deleteService(${i})" title="删除">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    `;

    card.addEventListener("click", (e) => {
      if (e.target.closest(".card-action-btn")) return;
      window.open(svc.url, "_blank");
    });

    // Drag events
    card.addEventListener("dragstart", handleDragStart);
    card.addEventListener("dragend", handleDragEnd);
    card.addEventListener("dragover", handleDragOver);
    card.addEventListener("dragenter", handleDragEnter);
    card.addEventListener("dragleave", handleDragLeave);
    card.addEventListener("drop", handleDrop);

    grid.appendChild(card);
  });
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// === Drag & Drop ===
function handleDragStart(e) {
  dragSrcIndex = +this.dataset.index;
  this.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
}

function handleDragEnd() {
  this.classList.remove("dragging");
  document.querySelectorAll(".card").forEach(c => c.classList.remove("drag-over"));
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
}

function handleDragEnter(e) {
  e.preventDefault();
  this.classList.add("drag-over");
}

function handleDragLeave() {
  this.classList.remove("drag-over");
}

function handleDrop(e) {
  e.preventDefault();
  this.classList.remove("drag-over");
  const targetIndex = +this.dataset.index;
  if (dragSrcIndex === targetIndex) return;

  ensureVerified(() => {
    const [item] = config.services.splice(dragSrcIndex, 1);
    config.services.splice(targetIndex, 0, item);
    saveConfig();
    renderGrid(document.getElementById("search").value);
  });
}

// === Edit/Add Modal ===
function openEditModal(index = -1) {
  editingIndex = index;
  const modal = document.getElementById("modal-edit");
  const title = document.getElementById("modal-edit-title");

  if (index >= 0) {
    title.textContent = "编辑项目";
    const svc = config.services[index];
    document.getElementById("edit-name").value = svc.name;
    document.getElementById("edit-url").value = svc.url;
    document.getElementById("edit-icon-url").value = svc.iconType === "url" ? svc.icon : "";
    selectedIcon = svc.iconType === "preset" ? svc.icon : "server";
  } else {
    title.textContent = "新增项目";
    document.getElementById("edit-name").value = "";
    document.getElementById("edit-url").value = "";
    document.getElementById("edit-icon-url").value = "";
    selectedIcon = "server";
  }

  renderIconPicker();
  modal.classList.add("active");
}

function closeEditModal() {
  document.getElementById("modal-edit").classList.remove("active");
}

function renderIconPicker() {
  const container = document.getElementById("icon-picker");
  container.innerHTML = '<div class="icon-picker-container"><div class="icon-picker-grid">' +
    Object.entries(ICONS).map(([key]) =>
      `<div class="icon-picker-item ${selectedIcon === key ? 'selected' : ''}" data-icon="${key}">${ICONS[key]}<span>${key}</span></div>`
    ).join('') + '</div></div>';

  container.querySelectorAll(".icon-picker-item").forEach(el => {
    el.addEventListener("click", () => {
      selectedIcon = el.dataset.icon;
      document.getElementById("edit-icon-url").value = "";
      container.querySelectorAll(".icon-picker-item").forEach(i => i.classList.remove("selected"));
      el.classList.add("selected");
    });
  });
}

function saveService() {
  const name = document.getElementById("edit-name").value.trim();
  const url = document.getElementById("edit-url").value.trim();
  const iconUrl = document.getElementById("edit-icon-url").value.trim();

  if (!name || !url) { showToast("请填写名称和链接"); return; }

  const svc = { id: "svc-" + Date.now(), name, url };

  if (iconUrl) {
    svc.iconType = "url";
    svc.icon = iconUrl;
  } else {
    svc.iconType = "preset";
    svc.icon = selectedIcon;
  }

  const doSave = () => {
    if (editingIndex >= 0) {
      svc.id = config.services[editingIndex].id;
      config.services[editingIndex] = svc;
      showToast("已更新");
    } else {
      config.services.push(svc);
      showToast("已添加");
    }
    saveConfig();
    closeEditModal();
    renderGrid(document.getElementById("search").value);
  };

  ensureVerified(doSave);
}

function editService(index) {
  event.stopPropagation();
  openEditModal(index);
}

function deleteService(index) {
  event.stopPropagation();
  const name = config.services[index].name;
  if (!confirm(`确定删除「${name}」？`)) return;
  ensureVerified(() => {
    config.services.splice(index, 1);
    saveConfig();
    renderGrid(document.getElementById("search").value);
    showToast("已删除");
  });
}

// === Settings Modal ===
function openSettingsModal() {
  const container = document.getElementById("bg-presets");
  container.innerHTML = BG_PRESETS.map(bg =>
    `<div class="bg-preset-item ${config.background && config.background.value === bg.value ? 'selected' : ''}" data-value="${bg.value}" style="background:${bg.value}" title="${bg.name}"></div>`
  ).join('');

  container.querySelectorAll(".bg-preset-item").forEach(el => {
    el.addEventListener("click", () => {
      container.querySelectorAll(".bg-preset-item").forEach(i => i.classList.remove("selected"));
      el.classList.add("selected");
      document.getElementById("bg-custom").value = "";
      ensureVerified(() => {
        document.body.style.background = el.dataset.value;
        config.background = { type: "color", value: el.dataset.value };
        saveConfig();
      });
    });
  });

  if (config.background && config.background.value) {
    document.getElementById("bg-custom").value = config.background.value;
  }

  document.getElementById("modal-settings").classList.add("active");
}

function closeSettingsModal() {
  const custom = document.getElementById("bg-custom").value.trim();
  if (custom) {
    ensureVerified(() => {
      document.body.style.background = custom;
      config.background = { type: "color", value: custom };
      saveConfig();
    });
  }
  document.getElementById("modal-settings").classList.remove("active");
}

// === Init ===
document.getElementById("btn-add").addEventListener("click", () => openEditModal(-1));
document.getElementById("btn-settings").addEventListener("click", openSettingsModal);
document.getElementById("search").addEventListener("input", (e) => renderGrid(e.target.value));

// Close modals on overlay click
document.querySelectorAll(".modal-overlay").forEach(overlay => {
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) overlay.classList.remove("active");
  });
});

// Load & render
loadConfig().then(() => {
  applyBackground();
  renderGrid();
});
</script>
</body>
</html>

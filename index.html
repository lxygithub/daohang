<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #181818;
  color: #e0e0e0;
  min-height: 100vh;
  transition: background 0.3s;
}

a { color: inherit; text-decoration: none; }

/* Header */
.header {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 24px 0;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 16px;
}

.header-left { flex: 1; min-width: 200px; }

.header h1 {
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.clock {
  font-size: 0.85rem;
  color: #888;
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.search-input {
  padding: 8px 14px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  color: #e0e0e0;
  font-size: 0.9rem;
  outline: none;
  width: 220px;
  transition: border-color 0.2s, background 0.2s;
}
.search-input:focus {
  border-color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.08);
}
.search-input::placeholder { color: #666; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  color: #ccc;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.25);
}
.btn svg { width: 18px; height: 18px; }

/* Grid */
.main-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
}

.card-grid.drag-over .card-placeholder {
  opacity: 1;
  height: 120px;
}

/* Card */
.card {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 28px 16px;
  border-radius: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  cursor: grab;
  user-select: none;
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease, opacity 0.2s;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.12);
}
.card.dragging {
  opacity: 0.4;
  transform: scale(0.98);
}
.card.drag-over {
  border-top: 2px solid #888;
}

.card-icon {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #aaa;
}
.card-icon svg {
  width: 32px;
  height: 32px;
}
.card-icon img {
  width: 32px;
  height: 32px;
  object-fit: contain;
  border-radius: 4px;
}

.card-name {
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

/* Card action buttons */
.card-actions {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}
.card:hover .card-actions { opacity: 1; }

.card-action-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border: none;
  border-radius: 6px;
  background: rgba(255,255,255,0.1);
  color: #ccc;
  cursor: pointer;
  font-size: 0.8rem;
}
.card-action-btn:hover {
  background: rgba(255,255,255,0.2);
  color: #fff;
}
.card-action-btn svg { width: 14px; height: 14px; }
.card-action-btn.delete:hover { background: rgba(220,60,60,0.3); }

/* Placeholder for drop */
.card-placeholder {
  border: 2px dashed rgba(255,255,255,0.15);
  border-radius: 12px;
  opacity: 0;
  height: 0;
  transition: all 0.2s;
  pointer-events: none;
}

/* Modal overlay */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.active { display: flex; }

/* Modal */
.modal {
  background: #222;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 32px;
  width: 100%;
  max-width: 440px;
  max-height: 90vh;
  overflow-y: auto;
}

.modal h2 {
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 24px;
}

.form-group {
  margin-bottom: 18px;
}
.form-group label {
  display: block;
  font-size: 0.85rem;
  color: #999;
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  color: #e0e0e0;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: rgba(255,255,255,0.3); }

/* Icon picker */
.icon-picker-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.icon-picker-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 4px;
  border-radius: 8px;
  border: 2px solid transparent;
  background: rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.icon-picker-item:hover { background: rgba(255,255,255,0.08); }
.icon-picker-item.selected { border-color: rgba(255,255,255,0.4); }
.icon-picker-item svg { width: 24px; height: 24px; color: #aaa; }
.icon-picker-item span { font-size: 0.7rem; color: #888; margin-top: 4px; }

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 28px;
}

.btn-text {
  padding: 8px 20px;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-text.cancel {
  background: rgba(255,255,255,0.06);
  color: #aaa;
}
.btn-text.cancel:hover { background: rgba(255,255,255,0.1); }
.btn-text.primary {
  background: #3b82f6;
  color: #fff;
}
.btn-text.primary:hover { background: #2563eb; }

/* Settings modal - background presets */
.bg-presets {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 18px;
}
.bg-preset-item {
  height: 48px;
  border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color 0.15s;
}
.bg-preset-item:hover { border-color: rgba(255,255,255,0.3); }
.bg-preset-item.selected { border-color: #fff; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 10px 24px;
  border-radius: 8px;
  background: #333;
  color: #e0e0e0;
  font-size: 0.9rem;
  z-index: 2000;
  opacity: 0;
  transition: transform 0.3s, opacity 0.3s;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Responsive */
@media (max-width: 768px) {
  .card-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
  .card { padding: 22px 12px; }
  .header { padding: 24px 16px 0; }
  .main-content { padding: 16px; }
  .search-input { width: 160px; }
  .modal { padding: 24px; }
}
@media (max-width: 480px) {
  .card-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .card { padding: 18px 10px; border-radius: 10px; }
  .card-icon { width: 32px; height: 32px; }
  .card-icon svg { width: 26px; height: 26px; }
  .card-name { font-size: 0.85rem; }
  .header h1 { font-size: 1.4rem; }
  .search-input { width: 120px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* Selection */
::selection { background: rgba(255,255,255,0.15); }

/* Fade in animation */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.card { animation: fadeInUp 0.35s ease both; }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <h1>导航</h1>
    <div class="clock" id="clock"></div>
  </div>
  <div class="header-actions">
    <input type="text" class="search-input" id="search" placeholder="搜索...">
    <button class="btn" id="btn-add" title="新增">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="btn" id="btn-settings" title="设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</header>

<main class="main-content">
  <div class="card-grid" id="grid"></div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <h2 id="modal-edit-title">新增项目</h2>
    <div class="form-group">
      <label>名称</label>
      <input type="text" class="form-input" id="edit-name" placeholder="服务名称">
    </div>
    <div class="form-group">
      <label>链接</label>
      <input type="text" class="form-input" id="edit-url" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>图标</label>
      <div id="icon-picker"></div>
      <div style="margin-top:10px">
        <input type="text" class="form-input" id="edit-icon-url" placeholder="或输入图片URL：https://...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-text cancel" onclick="closeEditModal()">取消</button>
      <button class="btn-text primary" onclick="saveService()">保存</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal">
    <h2>设置</h2>
    <div class="form-group">
      <label>背景</label>
      <div class="bg-presets" id="bg-presets"></div>
      <input type="text" class="form-input" id="bg-custom" placeholder="自定义颜色值：#222 或渐变函数">
    </div>
    <div class="modal-footer">
      <button class="btn-text cancel" onclick="closeSettingsModal()">关闭</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// === Preset SVG Icons ===
const ICONS = {
  server: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1" fill="currentColor"/><circle cx="6" cy="18" r="1" fill="currentColor"/></svg>',
  shield: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
  folder: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',
  rocket: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 3 0 3 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-3 0-3"/></svg>',
  code: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>',
  mail: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>',
  wrench: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
  play: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
  download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  list: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>',
  globe: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/></svg>',
  lock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>',
  link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
};

const BG_PRESETS = [
  { name: "深灰", value: "#181818" },
  { name: "炭黑", value: "#111111" },
  { name: "暖灰", value: "#1a1a18" },
  { name: "微绿", value: "#161b16" },
  { name: "微蓝", value: "#141820" },
  { name: "微棕", value: "#1a1614" },
  { name: "中灰", value: "#222222" },
  { name: "纯黑", value: "#000000" },
];

// === State ===
let config = null;
let editingIndex = -1;
let selectedIcon = "server";
let dragSrcIndex = -1;

// === Clock ===
function updateClock() {
  const now = new Date();
  const d = now.toLocaleDateString("zh-CN", { year: "numeric", month: "2-digit", day: "2-digit", weekday: "short" });
  const t = now.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  document.getElementById("clock").textContent = `${d} ${t}`;
}
updateClock();
setInterval(updateClock, 1000);

// === Toast ===
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2000);
}

// === API ===
async function loadConfig() {
  try {
    const res = await fetch("/api/config");
    config = await res.json();
  } catch (e) {
    // Fallback: use default if API unavailable
    config = getDefaultConfig();
  }
}

async function saveConfig() {
  try {
    await fetch("/api/config", { method: "POST", body: JSON.stringify(config), headers: { "Content-Type": "application/json" } });
  } catch (e) {
    // Fallback: save to localStorage
    localStorage.setItem("nav_config", JSON.stringify(config));
  }
}

function getDefaultConfig() {
  return {
    services: [
      { id: "nginx", name: "Nginx", url: "https://nginx.ieoc.top", iconType: "preset", icon: "server" },
      { id: "1panel", name: "1Panel", url: "https://1pannel.ieoc.top", iconType: "preset", icon: "shield" },
      { id: "files", name: "Files", url: "https://files.ieoc.top", iconType: "preset", icon: "folder" },
      { id: "v2ray", name: "V2Ray", url: "https://v2ray.ieoc.top", iconType: "preset", icon: "rocket" },
      { id: "cassos", name: "Cassos", url: "https://cassos.ieoc.top", iconType: "preset", icon: "code" },
      { id: "163", name: "163", url: "https://163.ieoc.top", iconType: "preset", icon: "mail" },
      { id: "jenkins", name: "Jenkins", url: "https://jenkins.ieoc.top", iconType: "preset", icon: "wrench" },
      { id: "emby", name: "Emby", url: "https://emby.ieoc.top", iconType: "preset", icon: "play" },
      { id: "qb", name: "QB", url: "https://qb.ieoc.top", iconType: "preset", icon: "download" },
      { id: "alist", name: "Alist", url: "https://alist.ieoc.top", iconType: "preset", icon: "list" },
      { id: "halo", name: "Halo", url: "https://halo.ieoc.top", iconType: "preset", icon: "globe" },
      { id: "wireguard", name: "WireGuard", url: "http://106.75.241.220:51821/", iconType: "preset", icon: "lock" },
      { id: "gh-proxy", name: "GH-Proxy", url: "https://gh-proxy.ieoc.top/", iconType: "preset", icon: "link" },
    ],
    background: { type: "color", value: "#181818" },
  };
}

// === Render ===
function applyBackground() {
  if (config.background) {
    document.body.style.background = config.background.value;
  }
}

function renderGrid(filter = "") {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const q = filter.toLowerCase();

  config.services.forEach((svc, i) => {
    if (q && !svc.name.toLowerCase().includes(q)) return;

    const card = document.createElement("div");
    card.className = "card";
    card.draggable = true;
    card.dataset.index = i;
    card.style.animationDelay = `${i * 0.04}s`;

    let iconHtml = "";
    if (svc.iconType === "url" && svc.icon) {
      iconHtml = `<div class="card-icon"><img src="${escHtml(svc.icon)}" alt="${escHtml(svc.name)}"></div>`;
    } else if (ICONS[svc.icon]) {
      iconHtml = `<div class="card-icon">${ICONS[svc.icon]}</div>`;
    } else {
      iconHtml = `<div class="card-icon">${ICONS.server}</div>`;
    }

    card.innerHTML = `
      ${iconHtml}
      <div class="card-name" title="${escHtml(svc.url)}">${escHtml(svc.name)}</div>
      <div class="card-actions">
        <button class="card-action-btn" onclick="editService(${i})" title="编辑">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="card-action-btn delete" onclick="deleteService(${i})" title="删除">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    `;

    card.addEventListener("click", (e) => {
      if (e.target.closest(".card-action-btn")) return;
      window.open(svc.url, "_blank");
    });

    // Drag events
    card.addEventListener("dragstart", handleDragStart);
    card.addEventListener("dragend", handleDragEnd);
    card.addEventListener("dragover", handleDragOver);
    card.addEventListener("dragenter", handleDragEnter);
    card.addEventListener("dragleave", handleDragLeave);
    card.addEventListener("drop", handleDrop);

    grid.appendChild(card);
  });
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// === Drag & Drop ===
function handleDragStart(e) {
  dragSrcIndex = +this.dataset.index;
  this.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
}

function handleDragEnd() {
  this.classList.remove("dragging");
  document.querySelectorAll(".card").forEach(c => c.classList.remove("drag-over"));
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
}

function handleDragEnter(e) {
  e.preventDefault();
  this.classList.add("drag-over");
}

function handleDragLeave() {
  this.classList.remove("drag-over");
}

function handleDrop(e) {
  e.preventDefault();
  this.classList.remove("drag-over");
  const targetIndex = +this.dataset.index;
  if (dragSrcIndex === targetIndex) return;

  const [item] = config.services.splice(dragSrcIndex, 1);
  config.services.splice(targetIndex, 0, item);
  saveConfig();
  renderGrid(document.getElementById("search").value);
}

// === Edit/Add Modal ===
function openEditModal(index = -1) {
  editingIndex = index;
  const modal = document.getElementById("modal-edit");
  const title = document.getElementById("modal-edit-title");

  if (index >= 0) {
    title.textContent = "编辑项目";
    const svc = config.services[index];
    document.getElementById("edit-name").value = svc.name;
    document.getElementById("edit-url").value = svc.url;
    document.getElementById("edit-icon-url").value = svc.iconType === "url" ? svc.icon : "";
    selectedIcon = svc.iconType === "preset" ? svc.icon : "server";
  } else {
    title.textContent = "新增项目";
    document.getElementById("edit-name").value = "";
    document.getElementById("edit-url").value = "";
    document.getElementById("edit-icon-url").value = "";
    selectedIcon = "server";
  }

  renderIconPicker();
  modal.classList.add("active");
}

function closeEditModal() {
  document.getElementById("modal-edit").classList.remove("active");
}

function renderIconPicker() {
  const container = document.getElementById("icon-picker");
  container.innerHTML = '<div class="icon-picker-grid">' +
    Object.entries(ICONS).map(([key]) =>
      `<div class="icon-picker-item ${selectedIcon === key ? 'selected' : ''}" data-icon="${key}">${ICONS[key]}<span>${key}</span></div>`
    ).join('') + '</div>';

  container.querySelectorAll(".icon-picker-item").forEach(el => {
    el.addEventListener("click", () => {
      selectedIcon = el.dataset.icon;
      document.getElementById("edit-icon-url").value = "";
      container.querySelectorAll(".icon-picker-item").forEach(i => i.classList.remove("selected"));
      el.classList.add("selected");
    });
  });
}

function saveService() {
  const name = document.getElementById("edit-name").value.trim();
  const url = document.getElementById("edit-url").value.trim();
  const iconUrl = document.getElementById("edit-icon-url").value.trim();

  if (!name || !url) { showToast("请填写名称和链接"); return; }

  const svc = { id: "svc-" + Date.now(), name, url };

  if (iconUrl) {
    svc.iconType = "url";
    svc.icon = iconUrl;
  } else {
    svc.iconType = "preset";
    svc.icon = selectedIcon;
  }

  if (editingIndex >= 0) {
    svc.id = config.services[editingIndex].id;
    config.services[editingIndex] = svc;
    showToast("已更新");
  } else {
    config.services.push(svc);
    showToast("已添加");
  }

  saveConfig();
  closeEditModal();
  renderGrid(document.getElementById("search").value);
}

function editService(index) {
  event.stopPropagation();
  openEditModal(index);
}

function deleteService(index) {
  event.stopPropagation();
  if (!confirm(`确定删除「${config.services[index].name}」？`)) return;
  config.services.splice(index, 1);
  saveConfig();
  renderGrid(document.getElementById("search").value);
  showToast("已删除");
}

// === Settings Modal ===
function openSettingsModal() {
  const container = document.getElementById("bg-presets");
  container.innerHTML = BG_PRESETS.map(bg =>
    `<div class="bg-preset-item ${config.background && config.background.value === bg.value ? 'selected' : ''}" data-value="${bg.value}" style="background:${bg.value}" title="${bg.name}"></div>`
  ).join('');

  container.querySelectorAll(".bg-preset-item").forEach(el => {
    el.addEventListener("click", () => {
      container.querySelectorAll(".bg-preset-item").forEach(i => i.classList.remove("selected"));
      el.classList.add("selected");
      document.body.style.background = el.dataset.value;
      document.getElementById("bg-custom").value = "";
      config.background = { type: "color", value: el.dataset.value };
      saveConfig();
    });
  });

  if (config.background && config.background.value) {
    document.getElementById("bg-custom").value = config.background.value;
  }

  document.getElementById("modal-settings").classList.add("active");
}

function closeSettingsModal() {
  const custom = document.getElementById("bg-custom").value.trim();
  if (custom) {
    document.body.style.background = custom;
    config.background = { type: "color", value: custom };
    saveConfig();
  }
  document.getElementById("modal-settings").classList.remove("active");
}

// === Init ===
document.getElementById("btn-add").addEventListener("click", () => openEditModal(-1));
document.getElementById("btn-settings").addEventListener("click", openSettingsModal);
document.getElementById("search").addEventListener("input", (e) => renderGrid(e.target.value));

// Close modals on overlay click
document.querySelectorAll(".modal-overlay").forEach(overlay => {
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) overlay.classList.remove("active");
  });
});

// Load & render
loadConfig().then(() => {
  // Try localStorage fallback
  const saved = localStorage.getItem("nav_config");
  if (saved) {
    try { config = { ...config, ...JSON.parse(saved) }; } catch {}
  }
  applyBackground();
  renderGrid();
});
</script>
</body>
